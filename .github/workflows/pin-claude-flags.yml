name: Pin claude flag table

# Daily: track the latest claude CLI release, regenerate the pinned flag-arity
# table, and ship a tag.
#
#   - If the regenerated arity tables differ from what is committed ("new
#     content"), commit the regenerated flags_gen.go to main and tag it.
#   - If only the version string differs (arity identical), do NOT commit — just
#     tag the current commit, since cc-adapter parses that version's argv exactly
#     as the already-pinned one.
#
# Either way the job builds the release binaries itself: a tag pushed with the
# default GITHUB_TOKEN does not trigger release.yml (GitHub blocks workflow
# recursion), so this workflow is self-contained.

on:
  schedule:
    - cron: "0 9 * * *" # daily, 09:00 UTC
  workflow_dispatch:
    inputs:
      channel:
        description: "claude release channel to track"
        default: "latest"
        type: choice
        options: [latest, stable]

permissions:
  contents: write

concurrency:
  group: pin-claude-flags
  cancel-in-progress: false

env:
  CHANNEL: ${{ github.event.inputs.channel || 'latest' }}
  CDN: https://downloads.claude.ai/claude-code-releases

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.decide.outputs.proceed }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history + tags to commit and tag

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve channel version
        id: ver
        run: |
          set -euo pipefail
          V=$(curl -fsSL "$CDN/$CHANNEL")
          echo "Resolved $CHANNEL -> $V"
          [[ "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::unexpected version '$V'"; exit 1; }
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Skip if already tagged
        id: tagged
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/v$V" >/dev/null; then
            echo "v$V already tagged; nothing to do."
            echo "already=true" >> "$GITHUB_OUTPUT"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download and verify claude binary
        if: steps.tagged.outputs.already == 'false'
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          curl -fsSL "$CDN/$V/manifest.json" -o manifest.json
          SUM=$(jq -r '.platforms["linux-x64"].checksum' manifest.json)
          [ -n "$SUM" ] && [ "$SUM" != "null" ] || { echo "::error::no linux-x64 checksum in manifest"; exit 1; }
          curl -fsSL "$CDN/$V/linux-x64/claude" -o claude-bin
          echo "$SUM  claude-bin" | sha256sum -c -
          chmod +x claude-bin
          ./claude-bin --version

      - name: Regenerate flag table and gate on build + tests
        if: steps.tagged.outputs.already == 'false'
        run: |
          set -euo pipefail
          go run ./cmd/genclaudeflags -claude "$PWD/claude-bin" -out flags_gen.go
          test -z "$(gofmt -l flags_gen.go)" || { echo "::error::flags_gen.go is not gofmt-clean"; exit 1; }
          go vet ./...
          go build ./...
          go test ./...

      - name: Decide new-content vs version-only
        id: decide
        if: steps.tagged.outputs.already == 'false'
        run: |
          set -euo pipefail
          # Strip the two lines that carry the version (header comment + the
          # PinnedClaudeVersion const) so we compare only the arity tables.
          filter='PinnedClaudeVersion|generated by cmd/genclaudeflags from claude'
          git show HEAD:flags_gen.go | grep -vE "$filter" > old_norm || true
          grep -vE "$filter" flags_gen.go > new_norm || true
          if diff -q old_norm new_norm >/dev/null; then
            echo "content_changed=false" >> "$GITHUB_OUTPUT"
            echo "Arity tables unchanged vs pinned; will tag the current commit."
          else
            echo "content_changed=true" >> "$GITHUB_OUTPUT"
            echo "Arity tables changed; will commit the regenerated table."
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        if: steps.tagged.outputs.already == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit regenerated table (new content)
        if: steps.tagged.outputs.already == 'false' && steps.decide.outputs.content_changed == 'true'
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          git add flags_gen.go
          git commit -m "feat(cli): bump pinned claude flag table to $V

          Regenerated by the daily pin-claude-flags workflow against claude $V."
          git push origin HEAD:main

      - name: Tag and push
        if: steps.tagged.outputs.already == 'false'
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          if [ "${{ steps.decide.outputs.content_changed }}" = "true" ]; then
            MSG="cc-adapter v$V — pinned to claude CLI $V"
          else
            MSG="cc-adapter v$V — claude CLI $V flag arity identical to the pinned table; no code change"
          fi
          git tag -a "v$V" -m "$MSG"
          git push origin "refs/tags/v$V"

  build:
    needs: detect
    if: needs.detect.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.detect.outputs.version }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o dist/cc-adapter .
          tar -C dist -czf "cc-adapter_v${{ needs.detect.outputs.version }}_linux_${{ matrix.goarch }}.tar.gz" cc-adapter

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goarch }}
          path: "cc-adapter_*_linux_*.tar.gz"

  release:
    needs: [detect, build]
    if: needs.detect.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect.outputs.version }}
          files: "cc-adapter_*_linux_*.tar.gz"
